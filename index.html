<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> To-Do List Life Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="page">

    <!-- Greeting -->
    <header class="card greeting-card">
      <div class="greeting-text">
        <p class="eyebrow" id="dateLine">Loading date…</p>
        <h1 class="greeting" id="greetingLine">Hello</h1>
        <button class="link-btn" id="editNameBtn" type="button">Set your name</button>
      </div>
      <div class="clock" id="clock">00:00:00</div>
    </header>

    <main class="grid">

      <!-- Focus Timer -->
      <section class="card">
        <div class="card-header">
          <h2>Focus Timer</h2>
          <button class="icon-btn" id="timerSettingsBtn" type="button" title="Change duration" aria-label="Change timer duration">⚙</button>
        </div>

        <div class="timer-face">
          <svg class="timer-ring" viewBox="0 0 200 200" aria-hidden="true">
            <circle class="ring-track" cx="100" cy="100" r="88" />
            <circle class="ring-progress" id="ringProgress" cx="100" cy="100" r="88" />
          </svg>
          <div class="timer-time" id="timerDisplay">25:00</div>
        </div>

        <div class="timer-settings" id="timerSettings" hidden>
          <label for="durationInput">Session length (minutes)</label>
          <input type="number" id="durationInput" min="1" max="120" value="25" />
          <button class="btn btn-small" id="saveDurationBtn" type="button">Save</button>
        </div>

        <div class="timer-controls">
          <button class="btn btn-primary" id="startBtn" type="button">Start</button>
          <button class="btn" id="stopBtn" type="button" disabled>Stop</button>
          <button class="btn btn-ghost" id="resetBtn" type="button">Reset</button>
        </div>
      </section>

      <!-- To-Do List -->
      <section class="card">
        <div class="card-header">
          <h2>Tasks</h2>
          <span class="count-pill" id="taskCount">0</span>
        </div>

        <form class="add-row" id="taskForm">
          <input type="text" id="taskInput" placeholder="Add a new task…" autocomplete="off" />
          <button class="btn btn-primary" type="submit">Add</button>
        </form>
        <p class="hint" id="taskHint" hidden>That task is already on your list.</p>

        <ul class="task-list" id="taskList"></ul>
        <p class="empty-state" id="taskEmpty">Nothing here yet — add your first task above.</p>
      </section>

      <!-- Quick Links -->
      <section class="card">
        <div class="card-header">
          <h2>Quick Links</h2>
        </div>

        <form class="add-row link-row" id="linkForm">
          <input type="text" id="linkNameInput" placeholder="Link name" autocomplete="off" />
          <input type="text" id="linkUrlInput" placeholder="URL" autocomplete="off" />
          <button class="btn btn-primary" type="submit">Add</button>
        </form>

        <div class="chip-list" id="linkList"></div>
        <p class="empty-state" id="linkEmpty">No links saved yet.</p>
      </section>

    </main>

    <footer class="footer-note">Daybook · everything you add stays right here</footer>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
